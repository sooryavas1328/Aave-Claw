<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#3498db"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#3498db;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#9b59b6;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)" rx="12"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.04" stroke="#9b59b6" stroke-width="1">
    <line x1="0" y1="56" x2="1200" y2="56"/>
    <line x1="0" y1="112" x2="1200" y2="112"/>
    <line x1="0" y1="168" x2="1200" y2="168"/>
    <line x1="0" y1="224" x2="1200" y2="224"/>
    <line x1="150" y1="0" x2="150" y2="280"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="450" y1="0" x2="450" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="750" y1="0" x2="750" y2="280"/>
    <line x1="900" y1="0" x2="900" y2="280"/>
    <line x1="1050" y1="0" x2="1050" y2="280"/>
  </g>

  <!-- Glow bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)" rx="2"/>

  <!-- Left decorative circles -->
  <circle cx="80" cy="140" r="55" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <circle cx="80" cy="140" r="38" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.2"/>
  <circle cx="80" cy="140" r="20" fill="url(#glowGrad)" opacity="0.4"/>

  <!-- Lightning bolt icon -->
  <text x="68" y="152" font-size="28" fill="#f1c40f" filter="url(#glow)" font-family="serif">⚡</text>

  <!-- Main title -->
  <text x="160" y="110" font-family="'Courier New', monospace" font-size="68" font-weight="bold" fill="url(#accent)" filter="url(#glow)" letter-spacing="-2">AAVE-CLAW</text>

  <!-- Subtitle -->
  <text x="162" y="148" font-family="'Courier New', monospace" font-size="20" fill="#bdc3e8" letter-spacing="3">HIGH-PERFORMANCE DEFI BOT  ·  BUILT IN RUST</text>

  <!-- Tags row -->
  <g font-family="'Courier New', monospace" font-size="14">
    <!-- Tag 1 -->
    <rect x="162" y="168" width="170" height="28" rx="6" fill="#9b59b6" opacity="0.25" stroke="#9b59b6" stroke-width="1" stroke-opacity="0.6"/>
    <text x="247" y="187" text-anchor="middle" fill="#c39bd3">🔴 Liquidation Monitor</text>
    <!-- Tag 2 -->
    <rect x="344" y="168" width="148" height="28" rx="6" fill="#27ae60" opacity="0.2" stroke="#27ae60" stroke-width="1" stroke-opacity="0.6"/>
    <text x="418" y="187" text-anchor="middle" fill="#82e0aa">📈 Yield Tracker</text>
    <!-- Tag 3 -->
    <rect x="504" y="168" width="160" height="28" rx="6" fill="#2980b9" opacity="0.2" stroke="#2980b9" stroke-width="1" stroke-opacity="0.6"/>
    <text x="584" y="187" text-anchor="middle" fill="#7fb3d3">🤖 OpenClaw Skill</text>
    <!-- Tag 4 -->
    <rect x="676" y="168" width="200" height="28" rx="6" fill="#e67e22" opacity="0.15" stroke="#e67e22" stroke-width="1" stroke-opacity="0.5"/>
    <text x="776" y="187" text-anchor="middle" fill="#f0b27a">🦀 Zero Dependencies</text>
  </g>

  <!-- Command snippet -->
  <rect x="162" y="212" width="680" height="42" rx="8" fill="#0a0a14" stroke="#9b59b6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="182" y="229" font-family="'Courier New', monospace" font-size="13" fill="#9b59b6">$</text>
  <text x="196" y="229" font-family="'Courier New', monospace" font-size="13" fill="#c8d0e8">curl -fsSL</text>
  <text x="290" y="229" font-family="'Courier New', monospace" font-size="13" fill="#3498db">raw.githubusercontent.com/susanudgzf/Aave-Claw/main/scripts/install.sh</text>
  <text x="182" y="246" font-family="'Courier New', monospace" font-size="13" fill="#9b59b6">  </text>
  <text x="196" y="246" font-family="'Courier New', monospace" font-size="13" fill="#7f8c8d">| bash    # Linux &amp; macOS</text>

  <!-- Right side — stat panel -->
  <rect x="920" y="50" width="240" height="180" rx="10" fill="#0a0a14" stroke="#9b59b6" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1040" y="78" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#9b59b6" letter-spacing="2">NETWORKS</text>
  <text x="1040" y="112" text-anchor="middle" font-family="'Courier New', monospace" font-size="40" font-weight="bold" fill="url(#accent)" filter="url(#glow)">12+</text>
  <line x1="940" y1="128" x2="1140" y2="128" stroke="#9b59b6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="1040" y="152" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#7f8c8d">Windows · Linux · macOS</text>
  <text x="1040" y="172" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#7f8c8d">Single binary · No runtime</text>
  <text x="1040" y="192" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#27ae60">MIT License · Open Source</text>
  <text x="1040" y="214" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#9b59b6">github.com/susanudgzf</text>

  <!-- Bottom glow bar -->
  <rect x="0" y="276" width="1200" height="4" fill="url(#accent)" rx="2"/>
</svg>
